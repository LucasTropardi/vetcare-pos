name: Build, publish to GHCR and deploy to Kubernetes

on:
  push:
    branches:
      - master
  release:
    types:
      - released

permissions:
  contents: read
  packages: write
  actions: write

jobs:
  cancel-previous-runs:
    runs-on: ubuntu-latest
    steps:
      - name: Cancel Previous Runs
        uses: styfle/cancel-workflow-action@0.9.0
        with:
          access_token: ${{ secrets.GITHUB_TOKEN }}

  deploy:
    name: Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry (GHCR)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/lucastropardi/vetcare-pos:latest

      - name: Restart Kubernetes Deployment via SSH
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            echo "Iniciando restart do deployment..."
            kubectl rollout restart deployment vetcare-pos
            echo "Aguardando rollout concluir..."
            kubectl rollout status deployment vetcare-pos
            echo "Deploy finalizado com sucesso."

      - name: Delete old package versions
        uses: actions/delete-package-versions@v5
        with:
          package-name: vetcare-pos
          package-type: container
          min-versions-to-keep: 1
          delete-only-untagged-versions: false
          
   